

<html>
<head>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .email-container {
            max-width: 500px;
            margin: 40px auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid #e0e0e0;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 16px;
            line-height: 1.5;
        }
        .code-box {
            display: inline-block;
            background-color: #193434;
            color: #ffffff;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 8px;
            padding: 15px 30px;
            border-radius: 8px;
            margin: 25px 0;
            border: 2px solid #4c5e5e;
            word-break: break-all;

        }
        .timer-warning {
            color: #d9534f;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class='email-container'>
        <h2>Verify Your Email</h2>
        <p>Your BillFlow verification code is below. Enter this code on the verification page to continue.</p>

        <div class='code-box'>
            {verificationCode}
        </div>

        <p class='timer-warning'>
            ⚠️ This code expires in 60 seconds.
        </p>

        <div class='footer'>
            If you did not request this code, please ignore this message.<br>
            &copy; {DateTime.Now.Year} BillFlow
        </div>
    </div>
</body>
</html>
